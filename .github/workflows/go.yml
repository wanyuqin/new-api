name: Go

on:
  push:
  pull_request:
    branches: ["main", "dev"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Download Go dependencies
        run: go mod download

      - name: Build web default
        working-directory: web/default
        run: |
          bun install
          DISABLE_ESLINT_PLUGIN=true VITE_REACT_APP_VERSION=$(cat ../../VERSION) bun run build

      - name: Build web classic
        working-directory: web/classic
        run: |
          bun install
          VITE_REACT_APP_VERSION=$(cat ../../VERSION) bun run build

      - name: Check frontend dist
        run: |
          ls -la web/default/dist
          ls -la web/classic/dist

      - name: Test Go
        run: go test ./...

      - name: Build Go
        run: go build -v ./...
